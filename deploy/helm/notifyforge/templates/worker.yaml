{{- /*
NotifyForge — Worker Deployment
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: notifyforge-worker
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.worker.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 25%, maxUnavailable: 0 }
  selector:
    matchLabels:
      app.kubernetes.io/name: notifyforge-worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notifyforge-worker
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: worker
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bun", "run", "worker:start"]
          env:
            - name: NODE_ENV
              value: production
            - name: ROLE
              value: worker
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: redis-url
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
---
{{- if .Values.worker.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-worker
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-worker
  minReplicas: {{ .Values.worker.hpa.minReplicas }}
  maxReplicas: {{ .Values.worker.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: {{ .Values.worker.hpa.targetCPUUtilization }} }
    {{- if .Values.worker.hpa.queueDepthTarget }}
    - type: External
      external:
        metric:
          name: notifyforge_queue_depth
          selector:
            matchLabels: { queue: default }
        target: { type: AverageValue, averageValue: {{ .Values.worker.hpa.queueDepthTarget | quote }} }
    {{- end }}
{{- end }}
---
{{- if .Values.pdb.worker.minAvailable }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-worker
  namespace: {{ .Release.Namespace }}
spec:
  minAvailable: {{ .Values.pdb.worker.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: notifyforge-worker
      app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
