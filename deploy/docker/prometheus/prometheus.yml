global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: 'notifyforge-api'
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ['api:3000']
        labels:
          service: 'api'

  - job_name: 'notifyforge-worker'
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ['worker:3000']
        labels:
          service: 'worker'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse-exporter:9116']
