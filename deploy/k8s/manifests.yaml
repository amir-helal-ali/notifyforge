# NotifyForge — Kubernetes Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: notifyforge
  labels:
    app.kubernetes.io/name: notifyforge
    app.kubernetes.io/part-of: notification-infrastructure
---
# ─────────────────────────────────────────────────────────────────────
# ConfigMap — non-secret configuration
# ─────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: notifyforge-config
  namespace: notifyforge
data:
  NODE_ENV: "production"
  REDIS_URL: "redis://notifyforge-redis:6379"
  CLICKHOUSE_URL: "http://notifyforge-clickhouse:8123"
  CLICKHOUSE_USER: "notifyforge"
  LOG_LEVEL: "info"
  WEBPUSH_SUBJECT: "mailto:admin@notifyforge.dev"
---
# ─────────────────────────────────────────────────────────────────────
# Secrets — pulled from external secret store (Vault / AWS Secrets Manager / GCP Secret Manager)
# The example below uses opaque secrets; in production wire up ExternalSecrets.
# ─────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: notifyforge-secrets
  namespace: notifyforge
type: Opaque
stringData:
  DATABASE_URL: "postgresql://notifyforge:CHANGE_ME@notifyforge-postgres:5432/notifyforge"
  CLICKHOUSE_PASSWORD: "CHANGE_ME"
  WEBHOOK_DEFAULT_SIGNING_KEY: "CHANGE_ME"
  # Channel credentials — leave empty to disable a channel
  FCM_SERVICE_ACCOUNT_JSON: ""
  APNS_KEY_ID: ""
  APNS_TEAM_ID: ""
  APNS_BUNDLE_ID: ""
  HMS_APP_ID: ""
  HMS_APP_SECRET: ""
  SENDGRID_API_KEY: ""
  TWILIO_ACCOUNT_SID: ""
  TWILIO_AUTH_TOKEN: ""
  TWILIO_FROM: ""
  WEBPUSH_VAPID_PUBLIC_KEY: ""
  WEBPUSH_VAPID_PRIVATE_KEY: ""
---
# ─────────────────────────────────────────────────────────────────────
# API Deployment — stateless, horizontally scalable
# ─────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifyforge-api
  namespace: notifyforge
  labels:
    app.kubernetes.io/name: notifyforge-api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: notifyforge-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notifyforge-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/api/v1/metrics"
        prometheus.io/port: "3000"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: api
          image: notifyforge/api:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: notifyforge-config
            - secretRef:
                name: notifyforge-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
# ─────────────────────────────────────────────────────────────────────
# Worker Deployment — pulls from Redis-backed BullMQ queues
# ─────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifyforge-worker
  namespace: notifyforge
  labels:
    app.kubernetes.io/name: notifyforge-worker
spec:
  replicas: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: notifyforge-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notifyforge-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: worker
          image: notifyforge/api:1.0.0
          imagePullPolicy: IfNotPresent
          command: ["bun", "run", "worker:start"]
          envFrom:
            - configMapRef:
                name: notifyforge-config
            - secretRef:
                name: notifyforge-secrets
          env:
            - name: ROLE
              value: "worker"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
---
# ─────────────────────────────────────────────────────────────────────
# HPA — autoscale on CPU and custom metrics (queue depth)
# ─────────────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notifyforge-api
  namespace: notifyforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notifyforge-api
  minReplicas: 3
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notifyforge-worker
  namespace: notifyforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notifyforge-worker
  minReplicas: 5
  maxReplicas: 100
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    # External metric: BullMQ queue depth (requires Prometheus Adapter)
    - type: External
      external:
        metric:
          name: notifyforge_queue_depth
          selector:
            matchLabels:
              queue: default
        target:
          type: AverageValue
          averageValue: "100"
---
# ─────────────────────────────────────────────────────────────────────
# Service — ClusterIP for internal traffic
# ─────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: notifyforge-api
  namespace: notifyforge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: notifyforge-api
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
---
# ─────────────────────────────────────────────────────────────────────
# Ingress — public entrypoint with TLS
# ─────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: notifyforge-api
  namespace: notifyforge
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/rate-limit-connections: "100"
    nginx.ingress.kubernetes.io/rate-limit-requests: "1000"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: [api.notifyforge.dev]
      secretName: notifyforge-tls
  rules:
    - host: api.notifyforge.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: notifyforge-api
                port:
                  number: 80
---
# ─────────────────────────────────────────────────────────────────────
# PodDisruptionBudget — ensure availability during node drains
# ─────────────────────────────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: notifyforge-api
  namespace: notifyforge
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: notifyforge-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: notifyforge-worker
  namespace: notifyforge
spec:
  minAvailable: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: notifyforge-worker
---
# ─────────────────────────────────────────────────────────────────────
# NetworkPolicy — deny-all default, allow only required traffic
# ─────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: notifyforge-api
  namespace: notifyforge
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: notifyforge-api
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: notifyforge-postgres
      ports: [{ protocol: TCP, port: 5432 }]
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: notifyforge-redis
      ports: [{ protocol: TCP, port: 6379 }]
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: notifyforge-clickhouse
      ports: [{ protocol: TCP, port: 8123 }]
    # DNS
    - to:
        - namespaceSelector: {}
      ports: [{ protocol: UDP, port: 53 }]
    # HTTPS egress to providers (FCM, APNs, Twilio, SendGrid, etc.)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports: [{ protocol: TCP, port: 443 }]
